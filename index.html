<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLSX Color & Comment Copier</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .upload-section {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .upload-box {
            flex: 1;
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .upload-box:hover { border-color: #4a90d9; background: #f0f6ff; }
        .upload-box.loaded { border-color: #27ae60; border-style: solid; background: #f0fff5; }
        .upload-box input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }
        .upload-box .label {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }
        .upload-box .hint {
            font-size: 0.8rem;
            color: #888;
        }
        .upload-box .filename {
            font-size: 0.8rem;
            color: #27ae60;
            margin-top: 8px;
            word-break: break-all;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4a90d9;
            color: #fff;
        }
        .btn-primary:hover { background: #357abd; }
        .btn-primary:disabled {
            background: #b0c4de;
            cursor: not-allowed;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
            margin-top: 12px;
        }
        .btn-success:hover { background: #219a52; }
        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: none;
        }
        .status.info { display: block; background: #e8f4fd; color: #1a6fa8; }
        .status.success { display: block; background: #e8f8ef; color: #1a7a42; }
        .status.error { display: block; background: #fde8e8; color: #a81a1a; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 500px) {
            .upload-section { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XLSX Color & Comment Copier</h1>
        <p class="subtitle">
            Import yesterday's file (with colors & comments) and today's file.
            Colors from column C and comments from column K will be copied to matching <strong>inv_num</strong> rows.
        </p>

        <div class="upload-section">
            <div class="upload-box" id="box-before">
                <input type="file" id="file-before" accept=".xlsx">
                <div class="label">Before (yesterday)</div>
                <div class="hint">File with colors & comments</div>
                <div class="filename" id="name-before"></div>
            </div>
            <div class="upload-box" id="box-current">
                <input type="file" id="file-current" accept=".xlsx">
                <div class="label">Current (today)</div>
                <div class="hint">File to update</div>
                <div class="filename" id="name-current"></div>
            </div>
        </div>

        <button class="btn btn-primary" id="btn-process" disabled>Process Files</button>

        <div class="status" id="status"></div>
        <button class="btn btn-success" id="btn-download" style="display:none;">Download Updated File</button>
    </div>

    <script>
        let beforeFile = null;
        let currentFile = null;
        let resultBlob = null;
        let currentFileName = '';

        const fileBefore = document.getElementById('file-before');
        const fileCurrent = document.getElementById('file-current');
        const btnProcess = document.getElementById('btn-process');
        const btnDownload = document.getElementById('btn-download');
        const statusEl = document.getElementById('status');

        fileBefore.addEventListener('change', (e) => {
            beforeFile = e.target.files[0];
            document.getElementById('name-before').textContent = beforeFile ? beforeFile.name : '';
            document.getElementById('box-before').classList.toggle('loaded', !!beforeFile);
            updateProcessBtn();
        });

        fileCurrent.addEventListener('change', (e) => {
            currentFile = e.target.files[0];
            currentFileName = currentFile ? currentFile.name : '';
            document.getElementById('name-current').textContent = currentFileName;
            document.getElementById('box-current').classList.toggle('loaded', !!currentFile);
            updateProcessBtn();
        });

        function updateProcessBtn() {
            btnProcess.disabled = !(beforeFile && currentFile);
        }

        function setStatus(msg, type) {
            statusEl.className = 'status ' + type;
            statusEl.innerHTML = msg;
        }

        // Convert theme color index + tint to an ARGB hex string.
        // ExcelJS exposes the workbook theme as wb._themes (XML string).
        // We parse the theme XML to extract the color palette, then apply tint.
        function parseThemeColors(wb) {
            const defaultPalette = [
                'FFFFFF', // 0 - lt1 (window/light)
                '000000', // 1 - dk1 (window text/dark)
                '4472C4', // 2 - lt2
                'A5A5A5', // 3 - dk2
                'ED7D31', // 4 - accent1
                'FFC000', // 5 - accent2
                '70AD47', // 6 - accent3
                '5B9BD5', // 7 - accent4
                '44546A', // 8 - accent5
                '7030A0', // 9 - accent6
                '0563C1', // 10 - hlink
                '954F72', // 11 - folHlink
            ];

            // Try to parse from workbook theme XML
            if (wb._themes && wb._themes.length > 0) {
                try {
                    const themeXml = wb._themes[0];
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(themeXml, 'application/xml');

                    // Find color scheme - look for a]clrScheme or a:clrScheme
                    const ns = 'http://schemas.openxmlformats.org/drawingml/2006/main';
                    let clrScheme = doc.getElementsByTagNameNS(ns, 'clrScheme')[0];

                    if (clrScheme) {
                        const colorNames = ['lt1', 'dk1', 'lt2', 'dk2',
                                           'accent1', 'accent2', 'accent3', 'accent4',
                                           'accent5', 'accent6', 'hlink', 'folHlink'];
                        // Note: Excel theme order is dk1, lt1, dk2, lt2, accent1...
                        // but theme index 0 = lt1, 1 = dk1, 2 = lt2, 3 = dk2 in Excel
                        const excelOrder = ['lt1', 'dk1', 'lt2', 'dk2',
                                           'accent1', 'accent2', 'accent3', 'accent4',
                                           'accent5', 'accent6', 'hlink', 'folHlink'];

                        for (let i = 0; i < excelOrder.length; i++) {
                            const el = clrScheme.getElementsByTagNameNS(ns, excelOrder[i])[0];
                            if (el) {
                                // Could be sysClr or srgbClr
                                const srgb = el.getElementsByTagNameNS(ns, 'srgbClr')[0];
                                const sys = el.getElementsByTagNameNS(ns, 'sysClr')[0];
                                if (srgb) {
                                    defaultPalette[i] = srgb.getAttribute('val');
                                } else if (sys) {
                                    defaultPalette[i] = sys.getAttribute('lastClr') || defaultPalette[i];
                                }
                            }
                        }
                    }
                } catch (e) {
                    console.warn('Could not parse theme XML, using defaults', e);
                }
            }
            return defaultPalette;
        }

        function applyTint(hex6, tint) {
            if (!tint || tint === 0) return hex6;
            let r = parseInt(hex6.substring(0, 2), 16);
            let g = parseInt(hex6.substring(2, 4), 16);
            let b = parseInt(hex6.substring(4, 6), 16);

            if (tint < 0) {
                const factor = 1 + tint;
                r = Math.round(r * factor);
                g = Math.round(g * factor);
                b = Math.round(b * factor);
            } else {
                r = Math.round(r + (255 - r) * tint);
                g = Math.round(g + (255 - g) * tint);
                b = Math.round(b + (255 - b) * tint);
            }

            const toHex = (v) => Math.max(0, Math.min(255, v)).toString(16).padStart(2, '0');
            return toHex(r) + toHex(g) + toHex(b);
        }

        function resolveColor(colorObj, themePalette) {
            if (!colorObj) return null;
            // If it has an argb value (RGB type)
            if (colorObj.argb && colorObj.argb !== '00000000') {
                return { argb: colorObj.argb };
            }
            // If it references a theme
            if (colorObj.theme !== undefined && colorObj.theme !== null) {
                const idx = colorObj.theme;
                if (idx < themePalette.length) {
                    const base = themePalette[idx];
                    const tint = colorObj.tint || 0;
                    const resolved = applyTint(base, tint);
                    return { argb: 'FF' + resolved.toUpperCase() };
                }
            }
            return null;
        }

        btnProcess.addEventListener('click', async () => {
            btnProcess.disabled = true;
            btnDownload.style.display = 'none';
            resultBlob = null;
            setStatus('<span class="spinner"></span> Reading files...', 'info');

            try {
                // Read both files
                const [beforeBuf, currentBuf] = await Promise.all([
                    beforeFile.arrayBuffer(),
                    currentFile.arrayBuffer()
                ]);

                setStatus('<span class="spinner"></span> Parsing "before" file...', 'info');
                const wbBefore = new ExcelJS.Workbook();
                await wbBefore.xlsx.load(beforeBuf);
                const wsBefore = wbBefore.worksheets[0];

                // Parse theme colors from the before workbook
                const themePalette = parseThemeColors(wbBefore);

                // Build a map: inv_num -> { fill, comment }
                const colorMap = new Map();
                const startRow = 4; // data starts at row 4

                wsBefore.eachRow((row, rowNum) => {
                    if (rowNum < startRow) return;
                    const cellC = row.getCell(3); // column C
                    const cellK = row.getCell(11); // column K
                    const invNum = cellC.value;
                    if (invNum === null || invNum === undefined) return;

                    const key = String(invNum).trim();
                    const entry = { fill: null, comment: null };

                    // Extract fill color - resolve theme colors to ARGB
                    if (cellC.fill && cellC.fill.type === 'pattern' && cellC.fill.pattern === 'solid') {
                        const fgColor = cellC.fill.fgColor;
                        const resolved = resolveColor(fgColor, themePalette);
                        if (resolved) {
                            entry.fill = {
                                type: 'pattern',
                                pattern: 'solid',
                                fgColor: resolved
                            };
                        }
                    }

                    // Extract comment from column K
                    if (cellK.value !== null && cellK.value !== undefined && cellK.value !== '') {
                        entry.comment = cellK.value;
                    }

                    // Only store if there's something to copy
                    if (entry.fill || entry.comment !== null) {
                        colorMap.set(key, entry);
                    }
                });

                setStatus(`<span class="spinner"></span> Found ${colorMap.size} rows with colors/comments. Processing current file...`, 'info');

                // Load current file
                const wbCurrent = new ExcelJS.Workbook();
                await wbCurrent.xlsx.load(currentBuf);
                const wsCurrent = wbCurrent.worksheets[0];

                let matched = 0;
                let colorApplied = 0;
                let commentApplied = 0;

                wsCurrent.eachRow((row, rowNum) => {
                    if (rowNum < startRow) return;
                    const cellC = row.getCell(3);
                    const cellK = row.getCell(11);
                    const invNum = cellC.value;
                    if (invNum === null || invNum === undefined) return;

                    const key = String(invNum).trim();
                    const entry = colorMap.get(key);
                    if (!entry) return;

                    matched++;

                    // Apply fill color to column C
                    if (entry.fill) {
                        cellC.fill = entry.fill;
                        colorApplied++;
                    }

                    // Apply comment to column K
                    if (entry.comment !== null) {
                        cellK.value = entry.comment;
                        commentApplied++;
                    }
                });

                setStatus('<span class="spinner"></span> Generating output file...', 'info');

                // Generate output
                const outBuf = await wbCurrent.xlsx.writeBuffer();
                resultBlob = new Blob([outBuf], {
                    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
                });

                setStatus(
                    `Done! Matched <strong>${matched}</strong> inv_num rows.<br>` +
                    `Colors applied: <strong>${colorApplied}</strong> | Comments applied: <strong>${commentApplied}</strong>`,
                    'success'
                );

                btnDownload.style.display = 'block';

            } catch (err) {
                console.error(err);
                setStatus('Error: ' + err.message, 'error');
            }

            btnProcess.disabled = false;
        });

        btnDownload.addEventListener('click', () => {
            if (!resultBlob) return;
            const url = URL.createObjectURL(resultBlob);
            const a = document.createElement('a');
            a.href = url;
            // Name the output file based on the current file name
            const baseName = currentFileName.replace(/\.xlsx$/i, '');
            a.download = baseName + '_updated.xlsx';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
